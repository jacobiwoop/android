name: Android Build

on:
  push:
    branches: ["main"] # Déclenche le build à chaque push sur la branche 'main'
  pull_request:
    branches: ["main"] # Déclenche le build à chaque PR vers la branche 'main'
  workflow_dispatch: # Permet de lancer le workflow manuellement depuis l'interface GitHub

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest # Utilise un environnement Linux

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # @capacitor/cli 8.x nécessite Node.js 22+

      - name: Install dependencies
        run: npm install
        working-directory: ./client

      - name: Build Web App (Vite)
        run: npm run build
        working-directory: ./client

      - name: Sync Capacitor
        run: npx cap sync android
        working-directory: ./client

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "21" # Requis par Capacitor 8 et les versions récentes d'AGP
          distribution: "temurin"

      - name: Make gradlew executable
        run: chmod +x gradlew
        working-directory: ./client/android

      - name: Build Debug APK
        working-directory: ./client/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
